services:
  postgres:
    image: postgres:16-alpine
    container_name: imagedata-postgres
    environment:
      POSTGRES_USER: imagedata
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-imagedata}
      POSTGRES_DB: imagedata_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagedata -d imagedata_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: imagedata-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: imagedata-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/imagedata --ignore-existing;
      exit 0;
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imagedata-backend
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql+asyncpg://imagedata:${POSTGRES_PASSWORD:-imagedata}@postgres:5432/imagedata_db
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_BUCKET_NAME=imagedata
      - S3_REGION=us-east-1
      - S3_PUBLIC_URL=http://localhost:9000
      - LABEL_TOOL_BASE_URL=http://host.docker.internal:8004
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8005
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: imagedata-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8005
      - NEXT_PUBLIC_LABEL_TOOL_URL=http://localhost:8004
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
